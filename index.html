<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">


    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Smart Counter</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>
    <div class="container">

        <h1>⚡ Smart Counter</h1>
        
        <div id="counter">0</div>
        
        <div class="buttons">
            <button id="decreaseBtn" class="btn decrease">− Decrease</button>

            <button id="resetBtn" class="btn reset">⟳ Reset</button>

            <button id="increaseBtn" class="btn increase">Increase +</button>

        </div>

        <div class="step-control">

            <label>Step value:</label>

            <input type="number" id="stepValue" value="1" min="1" max="100">

        </div>

        <button id="darkModeBtn" class="dark-mode-btn">🌙 Dark Mode</button>
        
    </div>

    <script src="script.js"></script>
</body>
</html>
